name: CI

on:
  push:
    branches:
    - main
    paths:
    - '**.swift'
    - '**.yml'
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-ci
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image:
          - 'swift:6.1'
          - 'swift:6.2'
          - 'swift:6.3'
        postgres-image:
          - 'postgres:17'
          - 'postgres:16'
          - 'postgres:14'
        include:
          - postgres-image: postgres:17
            postgres-auth: scram-sha-256
          - postgres-image: postgres:16
            postgres-auth: scram-sha-256
          - postgres-image: postgres:14
            postgres-auth: md5
    container:
      image: ${{ matrix.image }}
      volumes: [ 'pgrunshare:/var/run/postgresql' ]
    env:
      POSTGRES_DB: 'test_database'
      POSTGRES_USER: 'test_user'
      POSTGRES_PASSWORD: 'test_password'
      POSTGRES_HOSTNAME: 'psql'
      POSTGRES_SOCKET: '/var/run/postgresql/.s.PGSQL.5432'
      POSTGRES_HOST_AUTH_METHOD: ${{ matrix.postgres-auth }}
    services:
      psql:
        image: ${{ matrix.postgres-image }}
        volumes: [ 'pgrunshare:/var/run/postgresql' ]
        env:
          POSTGRES_DB: 'test_database'
          POSTGRES_USER: 'test_user'
          POSTGRES_PASSWORD: 'test_password'
          POSTGRES_HOST_AUTH_METHOD: ${{ matrix.postgres-auth }}
          POSTGRES_INITDB_ARGS: --auth-host=${{ matrix.postgres-auth }}
    steps:
    - name: Install curl
      run: apt-get update -yq && apt-get install -y curl
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
    - name: Test
      run: |
        swift test --enable-code-coverage
    - name: Upload coverage data
      uses: vapor/swift-codecov-action@2f478f2fd22e06ca363967d0fb6c6593a8548cee  # v0.3.5
      with:
        codecov_token: ${{ secrets.CODECOV_TOKEN }}
